name: CI — test & build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test-build:
    name: Lint, test, build (Vite + TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: yarn
          cache-dependency-path: frontend/yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run vitest (95+ tests)
        run: yarn test --run

      - name: Build for production
        run: yarn build
        env:
          # CI build needs at least one backend URL or api.ts throws.
          # Use a placeholder — real value is injected at Vercel deploy time.
          VITE_SUPABASE_PROJECT_ID: ci-placeholder
          VITE_SUPABASE_URL: https://ci-placeholder.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: ci-placeholder

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: frontend/dist
          retention-days: 7
